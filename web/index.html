<html>

<h1>REDNOVA OSINT</h1>

<input id="target">

<button onclick="run()">Investigar</button>

<pre id="result"></pre>

<script>

function run(){

let t = document.getElementById("target").value

fetch("/api/investigate?target="+t)

.then(r=>r.text())

.then(d=>document.getElementById("result").innerText=d)

}

</script>

</html>
